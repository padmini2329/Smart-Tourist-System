<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tourist Safety Monitoring</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f4f6f9;
    margin:0;
}

h2{
    color:#d90429;
    margin-top:20px;
}

#map{
    height:520px;
    width:92%;
    margin:20px auto;
    border-radius:12px;
    box-shadow:0 0 14px rgba(0,0,0,0.2);
}

#status{
    font-size:18px;
    font-weight:bold;
}

.safe{
    color:green;
}

.unsafe{
    color:red;
}

.neutral{
    color:#333;
}

</style>
</head>

<body>

<h2>📍 Smart Tourist Safety Monitoring</h2>
<p id="status" class="neutral">Getting precise GPS location...</p>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================
var map = L.map('map');
var marker = null;
var accuracyCircle = null;

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:"© OpenStreetMap"
}).addTo(map);


// ================= SAFE ZONES =================
const safeZones = [

 {lat:12.9763,lng:77.5929,radius:500,name:"Cubbon Park"},
 {lat:12.9507,lng:77.5848,radius:500,name:"Lalbagh Botanical Garden"},
 {lat:12.9752,lng:77.5960,radius:400,name:"Visvesvaraya Museum"},
 {lat:12.9987,lng:77.5920,radius:450,name:"Bangalore Palace"},
 {lat:13.0110,lng:77.5540,radius:500,name:"Orion Mall"},
 {lat:13.0090,lng:77.5511,radius:500,name:"ISKCON Temple"},
 {lat:12.9250,lng:77.5938,radius:450,name:"Jayanagar 4th Block"}

];


// ================= UNSAFE ZONES =================
const unsafeZones = [

 {lat:12.9767,lng:77.5713,radius:450,name:"Majestic Bus Stand"},
 {lat:12.9629,lng:77.5775,radius:400,name:"KR Market"},
 {lat:12.9177,lng:77.6237,radius:500,name:"Silk Board Junction"},
 {lat:13.0339,lng:77.6387,radius:500,name:"Tin Factory"},
 {lat:13.0358,lng:77.5970,radius:500,name:"Hebbal Flyover"},
 {lat:12.9833,lng:77.6033,radius:400,name:"Shivajinagar Bus Stand"},
 {lat:12.8399,lng:77.6770,radius:600,name:"Electronic City Toll"}

];


// ================= DRAW SAFE ZONES =================
safeZones.forEach(zone => {

    L.circle([zone.lat,zone.lng],{
        color:'green',
        fillColor:'#90ee90',
        fillOpacity:0.35,
        radius:zone.radius
    }).addTo(map).bindPopup(zone.name);

});


// ================= DRAW UNSAFE ZONES =================
unsafeZones.forEach(zone => {

    L.circle([zone.lat,zone.lng],{
        color:'red',
        fillColor:'#ff6b6b',
        fillOpacity:0.35,
        radius:zone.radius
    }).addTo(map).bindPopup(zone.name);

});



// ================= DISTANCE CALCULATION =================
function getDistance(lat1,lng1,lat2,lng2){

    const R=6371000;

    const dLat=(lat2-lat1)*Math.PI/180;
    const dLng=(lng2-lng1)*Math.PI/180;

    const a=Math.sin(dLat/2)**2 +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLng/2)**2;

    const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

    return R*c;

}



// ================= LOCATION SUCCESS =================
function success(position){

    const lat=position.coords.latitude;
    const lng=position.coords.longitude;
    const accuracy=position.coords.accuracy;

    let status=document.getElementById("status");

    status.innerHTML="Tracking (Accuracy: "+Math.round(accuracy)+" meters)";


    // Marker
    if(!marker){
        marker=L.marker([lat,lng]).addTo(map);
    }else{
        marker.setLatLng([lat,lng]);
    }


    // Accuracy circle
    if(!accuracyCircle){

        accuracyCircle=L.circle([lat,lng],{

            radius:accuracy,
            color:'blue',
            fillColor:'#3b82f6',
            fillOpacity:0.15

        }).addTo(map);

    }else{

        accuracyCircle.setLatLng([lat,lng]);
        accuracyCircle.setRadius(accuracy);

    }


    map.setView([lat,lng],17);



    // ===== ZONE CHECK =====
    let inUnsafe=false;
    let inSafe=false;

    for(let z of unsafeZones){

        if(getDistance(lat,lng,z.lat,z.lng)<=z.radius){
            inUnsafe=true;
            break;
        }

    }


    if(!inUnsafe){

        for(let z of safeZones){

            if(getDistance(lat,lng,z.lat,z.lng)<=z.radius){
                inSafe=true;
                break;
            }

        }

    }



    if(inUnsafe){

        status.innerHTML+=" — ⚠️ UNSAFE ZONE";
        status.className="unsafe";

    }

    else if(inSafe){

        status.innerHTML+=" — ✅ SAFE ZONE";
        status.className="safe";

    }

    else{

        status.innerHTML+=" — ℹ️ Outside monitored zones";
        status.className="neutral";

    }

}



// ================= LOCATION ERROR =================
function error(err){

    let status=document.getElementById("status");

    status.innerHTML="Location error: "+err.message;
    status.className="unsafe";

}



// ================= START GPS =================
if(navigator.geolocation){

    navigator.geolocation.watchPosition(

        success,
        error,
        {
            enableHighAccuracy:true,
            timeout:25000,
            maximumAge:0
        }

    );

}

</script>

</body>
</html>
