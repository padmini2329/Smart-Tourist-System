<!DOCTYPE html>
<html>
<head>
    <title>Live Tourist Location</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body { margin:0; font-family: Arial; text-align:center; }
        h2 { color:#d90429; margin:10px; }
        #map { height:90vh; width:100%; }
    </style>
</head>

<body>

<h2>📍 Live Tourist Location Tracking</h2>
<p id="status">Waiting for GPS...</p>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ✅ EXACT VERIFIED COORDINATES
const lat = 13.1718;
const lng = 77.5362;

// Create map
var map = L.map('map').setView([lat, lng], 18);

// Stable tiles (no blocking)
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap & CartoDB'
}).addTo(map);

// Marker
L.marker([lat, lng])
.addTo(map)
.bindPopup("📍 Itgalpur, Rajanakunte<br>Bangalore 560119")
.openPopup();

</script>

</body>
</html>
