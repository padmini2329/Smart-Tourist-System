<!DOCTYPE html>
<html>
<head>
<title>India Tourist Safety Monitoring</title>

{% load static %}

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body { 
font-family: Arial; 
text-align: center; 
background:#f4f6f9; 
margin:0;
}

h2 { color:#d90429; }

#map{
height:520px;
width:92%;
margin:20px auto;
border-radius:12px;
box-shadow:0 0 14px rgba(0,0,0,0.2);
}

#status{ 
font-size:18px; 
font-weight:bold; 
}

.safe{ color:green; }
.unsafe{ color:red; }
.neutral{ color:#333; }

/* Navbar */

.navbar {
display:flex;
align-items:center;
justify-content:space-between;
padding:20px 40px;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.logo {
font-size:20px;
font-weight:bold;
color:#203a43;
}

.nav-items{
display:flex;
gap:20px;
}

.nav-items a {
color:#8d8d8d;
text-decoration:none;
}

.btn{
padding:10px 20px;
border-radius:6px;
font-weight:600;
}

.primary{
background:#2563eb;
color:white;
}

.secondary{
border:2px solid #2563eb;
color:#2563eb;
}

</style>

</head>

<body>

<header class="navbar">
<div class="logo">🛡 Smart Tourist Safety</div>

<div class="nav-items">
<a href="{% url 'zones' %}">Safe & Unsafe Zones</a>
<a href="{% url 'emergency' %}">Emergency Alerts</a>
<a href="{% url 'feedback' %}">Feedback</a>
<a href="{% url 'panic' %}" class="btn secondary">Panic Button</a>
<a href="{% url 'livelocation' %}" class="btn primary">Live Location</a>
</div>

</header>

safeZones.forEach(z=>{
L.circle([z.lat,z.lng],{
color:'#00b300',
fillColor:'#00ff00',
fillOpacity:0.35,
weight:2,
radius:z.radius
}).addTo(map)
.bindPopup("✅ SAFE ZONE : " + z.name);
});


// ================= DRAW UNSAFE ZONES =================

unsafeZones.forEach(z=>{
L.circle([z.lat,z.lng],{
color:'#ff0000',
fillColor:'#ff4d4d',
fillOpacity:0.35,
weight:2,
radius:z.radius
}).addTo(map)
.bindPopup("⚠️ UNSAFE ZONE : " + z.name);
});
// ================= GPS =================

var marker;

function success(pos){

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

if(!marker){
marker=L.marker([lat,lng]).addTo(map);
}else{
marker.setLatLng([lat,lng]);
}

map.setView([lat,lng],15);

}

navigator.geolocation.watchPosition(success);

</script>

</body>
</html>
