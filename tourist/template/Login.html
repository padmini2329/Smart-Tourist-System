<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Smart Tourist Safety</title>

{% load static %}

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
height:100vh;
}

/* Header */

header{
background:#111;
color:white;
text-align:center;
padding:15px;
}

/* Background */

.outercont{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background-image: url("{% static 'css/TOURISM.jpg' %}");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
position: relative;
}

/* Blur overlay */

.outercont::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background: rgba(0,0,0,0.4);
backdrop-filter: blur(5px);
z-index:0;
}

/* Container */

.container{
position:relative;
z-index:1;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
width:350px;
}

.container h2{
text-align:center;
margin-bottom:20px;
}

/* Inputs */

.input-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
}

input{
width:100%;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
}

/* Button */

button{
width:100%;
padding:12px;
background:#203a43;
color:white;
border:none;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

button:hover{
background:#0f2027;
}

/* Link */

.link{
text-align:center;
margin-top:15px;
}

.link a{
text-decoration:none;
color:#203a43;
font-weight:600;
}

/* Responsive */

@media(max-width:768px){
.container{
width:90%;
}
}

</style>

</head>

<body>

<header>
<h1>Smart Tourist Safety System</h1>
</header>

<div class="outercont">

<div class="container">

<h2>Login</h2>

<form method="POST">
{% csrf_token %}

<div class="input-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" name="password" required>
</div>

<button type="submit">Login</button>

<p class="link">
Don't have account? 
<a href="{% url 'register' %}">Register</a>
</p>

</form>

</div>

</div>

</body>
</html>
